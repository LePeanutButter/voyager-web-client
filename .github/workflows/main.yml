# ===========================================
# GitHub Actions Workflow: CI Build & Deploy
# Environment: Production
# Description:
#   - Runs tests (if present) and SonarCloud static analysis
#   - Runs Trivy security scan on source code/dependencies
#   - Builds and packages the Voyager frontend app
#   - Produces manual deployment handoff artifact for S3/CloudFront
#   - Triggers on every push or pull request to the 'main' branch
# ===========================================

name: CI Build & Deploy (Web Client - Production)

# -------------------------------------------
# Trigger: Run workflow on push or PR to 'main' branch
# -------------------------------------------
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

# -------------------------------------------
# Jobs Definition
# -------------------------------------------
jobs:
  # =========================================
  # Job: Dynamic Analysis (Tests + Coverage)
  # Purpose: Run tests and generate coverage for SonarCloud
  # =========================================
  test_and_coverage:
    name: Tests & Coverage
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout source code
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Setup Node
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 3: Cache npm dependencies
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: npm-${{ runner.os }}

      # Step 4: Install dependencies
      - name: Clean Install dependencies
        run: |
          rm -rf node_modules
          npm ci

      # Step 5: Run tests with coverage (if present)
      - name: Run tests with coverage
        run: npm run test --if-present -- --coverage

      # Step 6: Upload coverage results
      - name: Upload Coverage Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Coverage
          path: coverage

  # =========================================
  # Job: Security Scan (Trivy)
  # Purpose: Scan filesystem and dependencies for vulnerabilities
  # =========================================
  trivy_scan:
    name: Run Trivy Security Scan
    needs: test_and_coverage
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout source code
      - name: Checkout project
        uses: actions/checkout@v4

      # Step 2: Run Trivy filesystem scan
      - name: Run Trivy FS Scan
        uses: aquasecurity/trivy-action@b6643a29fecd7f34b3597bc6acb0a98b03d33ff8
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'

  # =========================================
  # Job: SonarCloud Scan
  # Purpose: Run static code analysis with SonarCloud
  # =========================================
  sonar_scan:
    name: Sonar Cloud static analysis
    needs: trivy_scan
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout source code
      - name: Checkout project
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Install Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Step 3: Cache SonarCloud packages
      - name: Cache SonarCloud packages
        uses: actions/cache@v3
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      # Step 4: Download coverage artifact
      - name: Download Coverage Artifact
        uses: actions/download-artifact@v4
        with:
          name: Coverage
          path: coverage
        continue-on-error: true

      # Step 5: Set up Node.js for Sonar
      - name: Set up Node.js for Sonar
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Step 6: Install npm dependencies for Sonar
      - name: Install npm dependencies for Sonar
        run: npm ci --prefer-offline --no-audit

      # Step 7: Run SonarCloud scan
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # =========================================
  # Job: Build Stage
  # Purpose: Lint and build the app for production
  # =========================================
  build:
    name: Build Stage for Voyager Web Client (main)
    needs: sonar_scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20.x]
    steps:
      # Step 1: Checkout source code from repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up the Node.js environment
      - name: Set up Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      # Step 3: Cache npm dependencies to speed up builds
      - name: Cache npm dependencies
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: npm-${{ runner.os }}-package-lock.json
          restore-keys: |
            npm-${{ runner.os }}

      # Step 4: Install dependencies and lint
      - name: Install dependencies and lint
        run: |
          npm ci
          npm run lint

      # Step 5: Build the application for production
      - name: Compile source code
        run: npm run build

      # Step 6: Package build output as artifact for deployment
      - name: Package build artifacts
        run: |
          mkdir -p release
          tar -czf release/web-client-dist.tar.gz dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: web-client-dist
          path: release/web-client-dist.tar.gz

  # =========================================
  # Job: Deploy Stage (Manual)
  # Purpose: Manual deployment handoff for Learner Lab (user intervention required)
  # =========================================
  deploy_manual:
    if: github.event_name == 'push'
    name: Manual Deploy Handoff (Learner Lab)
    needs: build
    runs-on: ubuntu-latest
    env:
      AWS_REGION: us-east-1
      FRONTEND_BUCKET: smarttrip-frontend-bucket
    steps:
      # Step 1: Download build artifact
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: web-client-dist
          path: release

      # Step 2: Upload manual deployment package
      - name: Upload manual deployment package
        uses: actions/upload-artifact@v4
        with:
          name: web-client-production-manual-deploy
          path: |
            release/web-client-dist.tar.gz
            scripts/deploy-web-client-manual.sh
